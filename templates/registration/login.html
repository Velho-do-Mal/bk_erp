{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BK ERP — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bk_erp.css' %}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bk-bg); }
    .login-box {
      width: 100%; max-width: 380px;
      background: var(--bk-surface);
      border: 1px solid var(--bk-border);
      border-radius: 16px;
      padding: 40px 36px;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo img { width: 64px; height: 64px; border-radius: 14px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--bk-text); margin-top: 12px; }
    .login-logo p { font-size: 13px; color: var(--bk-text-muted); }
    .login-btn {
      width: 100%; padding: 11px;
      background: var(--bk-blue); color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #2563EB; }
    .error-msg { color: #FCA5A5; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="{% static 'assets/bk_icon.jpeg' %}" alt="BK" onerror="this.style.display='none'">
      <h1>BK ERP</h1>
      <p>Gestão de Projetos</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
      </div>

      {% if form.errors %}
      <div class="error-msg">⚠ Usuário ou senha incorretos.</div>
      {% endif %}

      <button type="submit" class="login-btn">Entrar</button>
    </form>
  </div>
</body>
</html>
